<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - YTCloud Downloader</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>YTCloud <span>Downloader</span></h1>
            </div>
            <nav class="nav-menu">
                <a href="/index">Home</a>
                <a href="about.html">About</a>
                <a href="privacy.html">Privacy</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <h2 class="page-title">Contact Us</h2>
            <div class="content-box">
                <form id="contactForm">
                    <input type="text" name="name" placeholder="Nama Anda" required>
                    <input type="email" name="email" placeholder="Email Anda" required>
                    <textarea name="message" placeholder="Pesan Anda..." rows="6" required></textarea>
                    <button type="submit" id="submitBtn">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 YTCloud Downloader by Pembri. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Success Popup -->
    <div id="successPopup" class="popup hidden">
        <div class="popup-content">
            <h3>✅ Pesan Terkirim!</h3>
            <p>Terima kasih! Kami akan membalas pesan Anda secepatnya.</p>
            <button onclick="closePopup()">Tutup</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Formspree AJAX Submit
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            
            submitBtn.textContent = 'Mengirim...';
            submitBtn.disabled = true;

            try {
                const response = await fetch('https://formspree.io/f/YOUR_FORM_ID', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        name: this.name.value,
                        email: this.email.value,
                        message: this.message.value
                    })
                });

                if (response.ok) {
                    document.getElementById('successPopup').classList.remove('hidden');
                    this.reset(); // Reset form
                } else {
                    alert('Gagal mengirim pesan. Silakan coba lagi.');
                }
            } catch (error) {
                alert('Terjadi kesalahan. Periksa koneksi internet Anda.');
            }

            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        });

        function closePopup() {
            document.getElementById('successPopup').classList.add('hidden');
        }
    </script>
</body>
</html>
