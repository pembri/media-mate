<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Mate - All-in-One Video Downloader Gratis</title>
    <meta name="description" content="Download video dari YouTube, Instagram, TikTok, dan Facebook dengan mudah dan cepat tanpa watermark menggunakan Media Mate.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <section class="hero">
            <h1>Satu Alat untuk Semua Media</h1>
            <p>Paste link video favoritmu dan download sekarang juga.</p>
            <div class="platform-grid">
                <a href="/media-mate/youtube" class="p-card yt"><i class="fab fa-youtube"></i> YouTube</a>
                <a href="/media-mate/instagram" class="p-card ig"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="/media-mate/tiktok" class="p-card tk"><i class="fab fa-tiktok"></i> TikTok</a>
                <a href="/media-mate/facebook" class="p-card fb"><i class="fab fa-facebook"></i> Facebook</a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="app.js"></script>
</body>
</html>
