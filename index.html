<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Mate - YouTube Downloader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 40px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            padding: 18px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            background: #222;
            color: #fff;
        }
        button {
            padding: 18px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        .result {
            background: #1e1e2e;
            padding: 25px;
            border-radius: 16px;
            margin-top: 20px;
            display: none;
        }
        .thumbnail {
            max-width: 100%;
            border-radius: 12px;
        }
        .download-btn {
            background: #00cc00;
            margin: 10px 5px;
            padding: 14px 24px;
        }
        .download-btn:hover {
            background: #00aa00;
        }
        footer {
            text-align: center;
            margin-top: 60px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Media Mate</h1>
        <p class="subtitle">YouTube Downloader Gratis & Cepat</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste link YouTube di sini..." autocomplete="off">
            <button onclick="downloadVideo()">Download</button>
        </div>

        <div id="result" class="result"></div>
    </div>

    <footer>
        Media Mate © 2026 - Pure Client Side • GitHub Pages
    </footer>

    <script src="script.js"></script>
</body>
</html>
