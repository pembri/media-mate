<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTCloud Downloader</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
<!-- Inline CSS - Full Style -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #1a1a1a;
            border-bottom: 2px solid #ff0000;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .logo span { color: #ff0000; }
        .nav-menu {
            display: flex;
            gap: 30px;
        }
        .nav-menu a {
            color: #f1f1f1;
            text-decoration: none;
            font-weight: 500;
        }
        .nav-menu a:hover, .nav-menu a.active {
            color: #ff0000;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span {
            width: 28px;
            height: 3px;
            background-color: white;
            border-radius: 3px;
        }
        .main-content {
            flex: 1;
            padding: 40px 0;
        }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h2 { font-size: 2.4rem; margin-bottom: 10px; }
        .subtitle { color: #aaaaaa; font-size: 1.1rem; }
        .input-section {
            max-width: 700px;
            margin: 0 auto 40px;
            display: flex;
            gap: 12px;
        }
        #urlInput {
            flex: 1;
            padding: 16px 20px;
            font-size: 1.05rem;
            background-color: #1f1f1f;
            border: 2px solid #333;
            border-radius: 12px;
            color: white;
            outline: none;
        }
        #urlInput:focus {
            border-color: #ff0000;
            box-shadow: 0 0 0 4px rgba(255, 0, 0, 0.1);
        }
        #generateBtn {
            padding: 0 32px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        #generateBtn:hover {
            background-color: #cc0000;
        }
        /* Tambahan style lain bisa ditambah nanti */
        footer {
            background-color: #1a1a1a;
            padding: 25px 0;
            text-align: center;
            border-top: 1px solid #333;
            margin-top: auto;
        }
        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-menu {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background-color: #1a1a1a;
                flex-direction: column;
                padding-top: 50px;
                gap: 25px;
                transition: 0.4s;
            }
            .nav-menu.active { left: 0; }
            .input-section { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>YTCloud <span>Downloader</span></h1>
            </div>
            <nav class="nav-menu">
                <a href="//" class="active">Home</a>
                <a href="/about">About</a>
                <a href="/privacy">Privacy</a>
                <a href="/contact">Contact</a>
            </nav>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="hero">
                <h2>Download Video & Audio YouTube</h2>
                <p class="subtitle">Cepat, Gratis, Tanpa Iklan</p>
            </div>

            <div class="input-section">
                <input type="text" id="urlInput" placeholder="Paste link YouTube di sini..." autocomplete="off">
                <button id="generateBtn">Generate</button>
            </div>

            <!-- Result Area -->
            <div id="result" class="result-container hidden">
                <div class="video-info">
                    <img id="thumbnail" src="" alt="Thumbnail">
                    <div class="info">
                        <h3 id="title"></h3>
                        <p id="duration"></p>
                    </div>
                </div>

                <div class="formats" id="formats">
                    <!-- Formats akan diisi oleh JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 YTCloud Downloader by Pembri. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/downloader.js"></script>
</body>
</html>
