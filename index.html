<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTCloud Downloader</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>YTCloud <span>Downloader</span></h1>
            </div>
            <nav class="nav-menu">
                <a href="/" class="active">Home</a>
                <a href="about.html">About</a>
                <a href="privacy.html">Privacy</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="hero">
                <h2>Download Video & Audio YouTube</h2>
                <p class="subtitle">Cepat, Gratis, Tanpa Iklan</p>
            </div>

            <div class="input-section">
                <input type="text" id="urlInput" placeholder="Paste link YouTube di sini..." autocomplete="off">
                <button id="generateBtn">Generate</button>
            </div>

            <!-- Result Area -->
            <div id="result" class="result-container hidden">
                <div class="video-info">
                    <img id="thumbnail" src="" alt="Thumbnail">
                    <div class="info">
                        <h3 id="title"></h3>
                        <p id="duration"></p>
                    </div>
                </div>

                <div class="formats" id="formats">
                    <!-- Formats akan diisi oleh JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 YTCloud Downloader by Pembri. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="js/downloader.js"></script>
</body>
</html>
