<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - YTCloud Downloader</title>
    
    <!-- Redirect otomatis ke halaman utama setelah 3 detik -->
    <meta http-equiv="refresh" content="3;url=/">
    
    <!-- Memberitahu mesin pencari untuk tidak mengindeks halaman error ini -->
    <meta name="robots" content="noindex, nofollow">
    
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            text-align: center;
            padding: 5rem 1rem;
        }
        .error-page h1 {
            font-size: 5rem;
            color: var(--yt-red);
            margin-bottom: 0.5rem;
            line-height: 1;
        }
        .error-page h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .error-page p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .btn-back {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            background-color: var(--yt-red);
            color: white;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color var(--transition-speed);
        }
        .btn-back:hover {
            background-color: var(--yt-red-hover);
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="nav-container">
            <a href="/" class="logo">YTCloud<span> Downloader</span></a>
            <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="/">Home</a>
                <a href="/about">About</a>
                <a href="/privacy">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="error-page">
            <h1>404</h1>
            <h2>Halaman Tidak Ditemukan</h2>
            <p>Sepertinya Anda tersesat. Anda akan dialihkan ke halaman utama dalam 3 detik...</p>
            <a href="/" class="btn-back">Kembali Sekarang</a>
        </div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>&copy; 2026 YTCloud Downloader by Pembri. All rights reserved.</p>
    </footer>

    <!-- Link JS -->
    <script src="script.js"></script>
    
    <!-- Fallback JavaScript Redirect -->
    <script>
        setTimeout(() => {
            window.location.href = '/';
        }, 3000);
    </script>
</body>
</html>
