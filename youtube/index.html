<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video & MP3 Downloader - Media Mate</title>
    <meta name="description" content="Download video YouTube kualitas HD hingga 4K atau ubah menjadi MP3 secara gratis dan cepat.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <main class="container">
        <div class="dl-box" id="dl-youtube">
            <h2><i class="fab fa-youtube color-yt"></i> YouTube Downloader</h2>
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste link YouTube di sini...">
                <button id="btn-check">Proses</button>
            </div>
            <div id="result-area"></div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="../app.js"></script>
</body>
</html>
